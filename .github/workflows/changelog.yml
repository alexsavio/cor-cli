name: Changelog

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - '.github/workflows/changelog.yml'

  workflow_dispatch:

permissions:
  contents: write

env:
  RUMDL_VERSION: "0.1.42"

jobs:
  changelog:
    name: Update Changelog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.12.0

      - name: Cache rumdl
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/rumdl
          key: rumdl-${{ env.RUMDL_VERSION }}
      - name: Install rumdl
        run: command -v rumdl || cargo install rumdl@${{ env.RUMDL_VERSION }}

      - name: Format changelog
        run: rumdl fmt CHANGELOG.md

      - name: Commit updated changelog
        run: |
          git diff --quiet CHANGELOG.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog [skip ci]"
          git pull --rebase
          git push
